<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      var RENDER_EVENT = "streamlit:render";
      function send(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type: type }, data),
          "*"
        );
      }
      window.Streamlit = {
        RENDER_EVENT: RENDER_EVENT,
        events: window,
        setComponentReady: function () { send("streamlit:componentReady", { apiVersion: 1 }); },
        setFrameHeight: function (height) {
          send("streamlit:setFrameHeight", { height: Math.max(320, Math.ceil(height)) });
        },
        setComponentValue: function (value) {
          send("streamlit:setComponentValue", { value: value, dataType: "json" });
        },
      };
      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || data.type !== "streamlit:render") return;
        window.dispatchEvent(new CustomEvent(RENDER_EVENT, { detail: data }));
      });
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 548px;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e1117;
      color: #eee;
    }
    #status { padding: 0.5rem 0.65rem; font-size: 0.8rem; color: #aaa; }
    #status.error { color: #ff8a8a; }
    #app { display: none; padding: 0 0.15rem 0.2rem; }
    #toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem; margin-bottom: 0.4rem;
    }
    #toolbar button {
      font-size: 0.8rem; padding: 0.32rem 0.6rem; border-radius: 5px;
      border: 1px solid rgba(140, 140, 140, 0.55);
      background: rgba(255, 255, 255, 0.08); color: #eee; cursor: pointer;
      user-select: none;
    }
    #toolbar button:hover { background: rgba(255, 255, 255, 0.14); }
    #toolbar button.active { border-color: #4da3ff; background: rgba(77, 163, 255, 0.22); }
    #toolbar button.primary { border-color: #4da3ff; background: rgba(77, 163, 255, 0.22); }
    #zoom-label { font-size: 0.74rem; color: rgba(210, 210, 210, 0.88); margin-left: 0.1rem; }
    #editor-layout { display: flex; gap: 0.5rem; align-items: flex-start; }
    #minimap-wrap {
      flex: 0 0 auto; border: 1px solid rgba(128, 128, 128, 0.45);
      border-radius: 6px; background: #111; padding: 4px; cursor: pointer;
    }
    #minimap { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    #minimap-caption { font-size: 0.62rem; color: rgba(180, 180, 180, 0.7); text-align: center; margin-top: 2px; }
    #wrap {
      flex: 1 1 auto; overflow: hidden; width: 100%; height: 400px;
      border: 1px solid rgba(128, 128, 128, 0.45); border-radius: 6px;
      background: #1a1a1a; cursor: crosshair; touch-action: none;
    }
    #wrap.panning { cursor: grab; }
    #wrap.panning:active { cursor: grabbing; }
    #main {
      display: block; width: 100%; height: 100%;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    #hint { margin: 0.35rem 0 0; font-size: 0.7rem; color: rgba(200, 200, 200, 0.68); line-height: 1.35; }
  </style>
</head>
<body>
  <div id="status">Loading bitmap grid…</div>
  <div id="app">
    <div id="toolbar">
      <button id="btn-fit" class="primary" type="button">Fit all</button>
      <button id="btn-out" type="button" title="Zoom out">−</button>
      <button id="btn-in" type="button" title="Zoom in">+</button>
      <button id="btn-detail" type="button" title="12 px per cell">Detail</button>
      <button id="btn-pan" type="button" title="Hold Space or use Pan mode">Pan</button>
      <span id="zoom-label">—</span>
    </div>
    <div id="editor-layout">
      <div id="minimap-wrap">
        <canvas id="minimap"></canvas>
        <div id="minimap-caption">overview · click to jump</div>
      </div>
      <div id="wrap"><canvas id="main"></canvas></div>
    </div>
    <p id="hint">
      Click/drag to paint · <strong>Space</strong> or Pan mode to move · scroll to pan ·
      ctrl+scroll to zoom · double-click to zoom in · Fit all to zoom out
    </p>
  </div>
  <script>
    const FRAME_H = 548;
    const CELL_MIN = 1;
    const CELL_MAX = 32;
    const DETAIL_ZOOM = 12;
    const MINIMAP_W = 148;
    const VIEW_H = 400;
    const DBL_MS = 280;

    let state = null;
    let painting = false;
    let panning = false;
    let panMode = false;
    let spaceHeld = false;
    let gesture = [];
    let panStart = null;
    let hoverCell = null;
    let eventsBound = false;
    let minimapDirty = true;
    let minimapRAF = 0;
    let lastClickAt = 0;
    let canvasW = 0;
    let canvasH = 0;

    const statusEl = document.getElementById("status");
    const appEl = document.getElementById("app");
    const wrap = document.getElementById("wrap");
    const canvas = document.getElementById("main");
    const ctx = canvas.getContext("2d");
    const minimap = document.getElementById("minimap");
    const miniCtx = minimap.getContext("2d");
    const zoomLabel = document.getElementById("zoom-label");
    const btnPan = document.getElementById("btn-pan");

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    function rgbAt(idx) {
      const p = state.palette[idx] || [0, 0, 0];
      return "rgb(" + p[0] + "," + p[1] + "," + p[2] + ")";
    }

    function shouldPan() {
      return panMode || spaceHeld || panning;
    }

    function updateWrapCursor() {
      wrap.classList.toggle("panning", shouldPan() && !painting);
    }

    function clampPan() {
      const pw = wrap.clientWidth || 300;
      const visW = pw / state.cellPx;
      const visH = VIEW_H / state.cellPx;
      state.panX = Math.max(0, Math.min(Math.max(0, state.W - visW), state.panX));
      state.panY = Math.max(0, Math.min(Math.max(0, state.H - visH), state.panY));
    }

    function fitCellPx() {
      const pw = wrap.clientWidth || 300;
      return Math.max(CELL_MIN, Math.min(CELL_MAX,
        Math.floor(Math.min(pw / state.W, VIEW_H / state.H))));
    }

    function zoomAtScreen(px, py, newCellPx) {
      newCellPx = Math.max(CELL_MIN, Math.min(CELL_MAX, newCellPx));
      if (newCellPx === state.cellPx) return;
      const bx = state.panX + px / state.cellPx;
      const by = state.panY + py / state.cellPx;
      state.cellPx = newCellPx;
      state.panX = bx - px / newCellPx;
      state.panY = by - py / newCellPx;
      clampPan();
      redraw(true);
    }

    function fitAll() {
      state.cellPx = fitCellPx();
      state.panX = 0;
      state.panY = 0;
      redraw(true);
    }

    function zoomStep(px, py, dir) {
      zoomAtScreen(px, py, state.cellPx + dir);
    }

    function zoomToDetailAt(bx, by) {
      const pw = wrap.clientWidth || 300;
      zoomAtScreen(pw * 0.5, VIEW_H * 0.5, DETAIL_ZOOM);
      state.panX = bx - pw * 0.5 / state.cellPx;
      state.panY = by - VIEW_H * 0.5 / state.cellPx;
      clampPan();
      redraw(true);
    }

    function viewInfo() {
      const pw = wrap.clientWidth || 300;
      const visW = Math.min(state.W, pw / state.cellPx);
      const visH = Math.min(state.H, VIEW_H / state.cellPx);
      return state.cellPx + "px/cell · " + Math.round(visW) + "×" + Math.round(visH) +
        " visible · " + state.W + "×" + state.H + " total";
    }

    function cellScreenRect(x, y) {
      const x0 = Math.floor(state.panX);
      const y0 = Math.floor(state.panY);
      const offX = -(state.panX - x0) * state.cellPx;
      const offY = -(state.panY - y0) * state.cellPx;
      return {
        sx: offX + (x - x0) * state.cellPx,
        sy: offY + (y - y0) * state.cellPx,
        vis: x >= x0 && x < x0 + Math.ceil((wrap.clientWidth || 300) / state.cellPx) + 1 &&
             y >= y0 && y < y0 + Math.ceil(VIEW_H / state.cellPx) + 1,
      };
    }

    function drawCell(x, y, highlight) {
      const r = cellScreenRect(x, y);
      if (!r.vis) return;
      const idx = state.indices[y * state.W + x];
      ctx.fillStyle = rgbAt(idx);
      ctx.fillRect(r.sx, r.sy, state.cellPx, state.cellPx);
      if (state.showGrid && state.cellPx >= 3) {
        ctx.strokeStyle = "rgba(0,0,0,0.28)";
        ctx.strokeRect(r.sx + 0.5, r.sy + 0.5, state.cellPx - 1, state.cellPx - 1);
      }
      if (highlight) {
        ctx.strokeStyle = "rgba(77, 163, 255, 0.95)";
        ctx.lineWidth = Math.max(1, Math.min(2, state.cellPx / 6));
        ctx.strokeRect(r.sx + 0.5, r.sy + 0.5, state.cellPx - 1, state.cellPx - 1);
      }
    }

    function drawMain() {
      const pw = wrap.clientWidth || 300;
      const ph = VIEW_H;
      if (canvas.width !== pw || canvas.height !== ph) {
        canvas.width = pw;
        canvas.height = ph;
        canvasW = pw;
        canvasH = ph;
      }
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(0, 0, pw, ph);

      const visCols = Math.ceil(pw / state.cellPx) + 1;
      const visRows = Math.ceil(ph / state.cellPx) + 1;
      const x0 = Math.floor(state.panX);
      const y0 = Math.floor(state.panY);
      const x1 = Math.min(state.W, x0 + visCols);
      const y1 = Math.min(state.H, y0 + visRows);

      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const hl = hoverCell && hoverCell.x === x && hoverCell.y === y && !painting;
          drawCell(x, y, hl);
        }
      }
      zoomLabel.textContent = viewInfo();
    }

    function drawMinimap() {
      if (!state) return;
      minimapDirty = false;
      const scale = MINIMAP_W / state.W;
      const mh = Math.max(40, Math.round(state.H * scale));
      if (minimap.width !== MINIMAP_W || minimap.height !== mh) {
        minimap.width = MINIMAP_W;
        minimap.height = mh;
      }
      const img = miniCtx.createImageData(MINIMAP_W, mh);
      for (let y = 0; y < state.H; y++) {
        for (let x = 0; x < state.W; x++) {
          const p = state.palette[state.indices[y * state.W + x]] || [0, 0, 0];
          const px0 = Math.floor(x * scale);
          const py0 = Math.floor(y * scale);
          const px1 = Math.max(px0 + 1, Math.ceil((x + 1) * scale));
          const py1 = Math.max(py0 + 1, Math.ceil((y + 1) * scale));
          for (let py = py0; py < py1 && py < mh; py++) {
            for (let px = px0; px < px1 && px < MINIMAP_W; px++) {
              const i = (py * MINIMAP_W + px) * 4;
              img.data[i] = p[0]; img.data[i + 1] = p[1]; img.data[i + 2] = p[2]; img.data[i + 3] = 255;
            }
          }
        }
      }
      miniCtx.putImageData(img, 0, 0);
      const pw = wrap.clientWidth || 300;
      const visW = Math.min(state.W, pw / state.cellPx);
      const visH = Math.min(state.H, VIEW_H / state.cellPx);
      miniCtx.strokeStyle = "#4da3ff";
      miniCtx.lineWidth = 2;
      miniCtx.strokeRect(state.panX * scale + 0.5, state.panY * scale + 0.5, visW * scale, visH * scale);
    }

    function scheduleMinimap() {
      minimapDirty = true;
      if (minimapRAF) return;
      minimapRAF = requestAnimationFrame(function () {
        minimapRAF = 0;
        if (minimapDirty) drawMinimap();
      });
    }

    function redraw(fullMinimap) {
      if (!state) return;
      drawMain();
      if (fullMinimap) drawMinimap();
      else scheduleMinimap();
    }

    function cellFromClient(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const px = clientX - rect.left;
      const py = clientY - rect.top;
      const bx = Math.floor(state.panX + px / state.cellPx);
      const by = Math.floor(state.panY + py / state.cellPx);
      if (bx < 0 || by < 0 || bx >= state.W || by >= state.H) return null;
      return { x: bx, y: by, px: px, py: py };
    }

    function cellFromMinimap(clientX, clientY) {
      const rect = minimap.getBoundingClientRect();
      const scale = MINIMAP_W / state.W;
      const bx = Math.floor((clientX - rect.left) / scale);
      const by = Math.floor((clientY - rect.top) / scale);
      if (bx < 0 || by < 0 || bx >= state.W || by >= state.H) return null;
      return { x: bx, y: by };
    }

    function paintCell(x, y) {
      const key = x + "," + y;
      if (state.gestureKeys.has(key)) return;
      state.gestureKeys.add(key);
      state.indices[y * state.W + x] = state.brushIdx;
      gesture.push({ x: x, y: y });
      drawCell(x, y, false);
      scheduleMinimap();
    }

    function finishGesture() {
      if (!gesture.length) return;
      Streamlit.setComponentValue({
        pixels: gesture.slice(),
        view: { cell_px: state.cellPx, pan_x: state.panX, pan_y: state.panY },
      });
      gesture = [];
      state.gestureKeys.clear();
    }

    function bindEvents() {
      if (eventsBound) return;
      eventsBound = true;

      document.getElementById("btn-fit").onclick = function () { fitAll(); };
      document.getElementById("btn-in").onclick = function () {
        const r = wrap.getBoundingClientRect();
        zoomStep(r.width * 0.5, VIEW_H * 0.5, 1);
      };
      document.getElementById("btn-out").onclick = function () {
        const r = wrap.getBoundingClientRect();
        zoomStep(r.width * 0.5, VIEW_H * 0.5, -1);
      };
      document.getElementById("btn-detail").onclick = function () {
        const r = wrap.getBoundingClientRect();
        zoomAtScreen(r.width * 0.5, VIEW_H * 0.5, DETAIL_ZOOM);
      };
      btnPan.onclick = function () {
        panMode = !panMode;
        btnPan.classList.toggle("active", panMode);
        updateWrapCursor();
      };

      window.addEventListener("keydown", function (e) {
        if (e.code === "Space" && !e.repeat) {
          spaceHeld = true;
          updateWrapCursor();
          e.preventDefault();
        }
      });
      window.addEventListener("keyup", function (e) {
        if (e.code === "Space") {
          spaceHeld = false;
          updateWrapCursor();
        }
      });

      canvas.onmousedown = function (ev) {
        if (ev.button === 1 || shouldPan()) {
          panning = true;
          panStart = { x: ev.clientX, y: ev.clientY, panX: state.panX, panY: state.panY };
          updateWrapCursor();
          ev.preventDefault();
          return;
        }
        if (ev.button !== 0) return;
        const now = Date.now();
        if (now - lastClickAt < DBL_MS) return;
        lastClickAt = now;
        painting = true;
        gesture = [];
        state.gestureKeys = new Set();
        const c = cellFromClient(ev.clientX, ev.clientY);
        if (c) paintCell(c.x, c.y);
      };

      canvas.onmousemove = function (ev) {
        if (panning && panStart) {
          state.panX = panStart.panX - (ev.clientX - panStart.x) / state.cellPx;
          state.panY = panStart.panY - (ev.clientY - panStart.y) / state.cellPx;
          clampPan();
          redraw(false);
          return;
        }
        const c = cellFromClient(ev.clientX, ev.clientY);
        const newHover = c ? { x: c.x, y: c.y } : null;
        if (painting && c) {
          paintCell(c.x, c.y);
        } else if (!painting &&
          ((!hoverCell && newHover) || (hoverCell && newHover &&
            (hoverCell.x !== newHover.x || hoverCell.y !== newHover.y)) ||
           (hoverCell && !newHover))) {
          hoverCell = newHover;
          redraw(false);
        }
      };

      canvas.onmouseup = function () {
        if (panning) {
          panning = false;
          panStart = null;
          updateWrapCursor();
          return;
        }
        if (!painting) return;
        painting = false;
        finishGesture();
      };

      canvas.onmouseleave = function () {
        if (hoverCell) {
          hoverCell = null;
          redraw(false);
        }
        if (panning) {
          panning = false;
          panStart = null;
          updateWrapCursor();
        }
      };

      canvas.oncontextmenu = function (ev) { ev.preventDefault(); };

      canvas.ondblclick = function (ev) {
        ev.preventDefault();
        painting = false;
        gesture = [];
        state.gestureKeys.clear();
        lastClickAt = 0;
        const c = cellFromClient(ev.clientX, ev.clientY);
        if (c) zoomToDetailAt(c.x, c.y);
      };

      wrap.onwheel = function (ev) {
        ev.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const px = ev.clientX - rect.left;
        const py = ev.clientY - rect.top;
        if (ev.ctrlKey || ev.metaKey) {
          zoomStep(px, py, ev.deltaY < 0 ? 1 : -1);
        } else {
          state.panX += ev.deltaX / state.cellPx;
          state.panY += ev.deltaY / state.cellPx;
          clampPan();
          redraw(false);
        }
      }, { passive: false };

      minimap.onmousedown = function (ev) {
        const c = cellFromMinimap(ev.clientX, ev.clientY);
        if (c) zoomToDetailAt(c.x, c.y);
      };

      window.addEventListener("resize", function () {
        if (state) redraw(true);
      });
    }

    function applyView(cellPx, panX, panY, fitIfNeeded) {
      if (fitIfNeeded || cellPx < 1) {
        requestAnimationFrame(fitAll);
        return;
      }
      state.cellPx = Math.max(CELL_MIN, Math.min(CELL_MAX, cellPx));
      state.panX = panX;
      state.panY = panY;
      clampPan();
      requestAnimationFrame(function () { redraw(true); });
    }

    function onRender(event) {
      try {
        const args = event.detail.args;
        if (!args || !args.indices_b64) {
          showError("Grid: missing bitmap data from app.");
          return;
        }
        const W = args.width;
        const H = args.height;
        const indices = b64ToBytes(args.indices_b64);
        if (indices.length !== W * H) {
          showError("Grid: bitmap size mismatch.");
          return;
        }

        const initCell = args.cell_px;
        const hasSavedView = initCell > 0;
        const prev = state;

        if (!prev) {
          state = {
            W: W, H: H, indices: indices, palette: args.palette || [],
            brushIdx: args.brush_idx || 0, showGrid: args.show_grid !== false,
            cellPx: 0, panX: 0, panY: 0, gestureKeys: new Set(),
          };
          showApp();
          bindEvents();
          applyView(initCell, args.pan_x || 0, args.pan_y || 0, !hasSavedView);
        } else {
          prev.indices = indices;
          prev.brushIdx = args.brush_idx || 0;
          prev.palette = args.palette || prev.palette;
          if (hasSavedView) {
            prev.cellPx = Math.max(CELL_MIN, Math.min(CELL_MAX, initCell));
            prev.panX = args.pan_x || 0;
            prev.panY = args.pan_y || 0;
          }
          state = prev;
          clampPan();
          gesture = [];
          painting = false;
          requestAnimationFrame(function () { redraw(true); });
        }
      } catch (err) {
        showError("Grid error: " + err.message);
      }
    }

    function showError(msg) {
      statusEl.textContent = msg;
      statusEl.className = "error";
      appEl.style.display = "none";
    }

    function showApp() {
      statusEl.style.display = "none";
      appEl.style.display = "block";
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(FRAME_H);
  </script>
</body>
</html>
